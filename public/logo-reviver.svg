<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180" role="img" aria-label="Comunidade Reviver em Cristo">
  <!-- Ícone 1: nota musical -->
  <g transform="translate(106,8)">
    <rect width="56" height="56" rx="12" fill="#e6362e" stroke="#7a1813" stroke-width="1.5" />
    <g fill="#ffffff">
      <rect x="33" y="12" width="4" height="26" rx="1" />
      <rect x="21" y="16" width="4" height="26" rx="1" />
      <path d="M21 16 L37 12 L37 18 L21 22 Z" />
      <ellipse cx="19" cy="40" rx="6" ry="4.5" />
      <ellipse cx="31" cy="36" rx="6" ry="4.5" />
    </g>
  </g>

  <!-- Ícone 2: cruz -->
  <g transform="translate(172,8)">
    <rect width="56" height="56" rx="12" fill="#bfe6f7" stroke="#1a1a1a" stroke-width="2" />
    <g fill="#f6c945" stroke="#1a1a1a" stroke-width="1.5" stroke-linejoin="round">
      <rect x="24" y="9" width="8" height="38" rx="2" />
      <rect x="13" y="20" width="30" height="8" rx="2" />
    </g>
  </g>

  <!-- Ícone 3: peixe -->
  <g transform="translate(238,8)">
    <rect width="56" height="56" rx="12" fill="#fdf8ee" stroke="#1a1a1a" stroke-width="2" />
    <g fill="#1a1a1a">
      <path d="M10,28 C10,16 22,14 30,14 C36,14 38,22 38,28 C38,34 36,42 30,42 C22,42 10,40 10,28 Z" />
      <path d="M37,28 L49,17 L49,39 Z" />
    </g>
    <circle cx="16" cy="24" r="1.8" fill="#fdf8ee" />
  </g>

  <!-- Wordmark -->
  <text x="200" y="122" text-anchor="middle"
        font-family="Arial Black, Arial, Helvetica, sans-serif"
        font-weight="900" font-size="46" letter-spacing="-0.5"
        fill="#15161a">Comunidade</text>

  <text x="204" y="158" text-anchor="middle" transform="rotate(-3 204 150)"
        font-family="Segoe Script, Brush Script MT, cursive"
        font-style="italic" font-size="27"
        fill="#15161a">Reviver em Cristo</text>
